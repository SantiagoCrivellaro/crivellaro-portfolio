<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow orbs -->
  <circle cx="200" cy="300" r="200" fill="#22d3ee" opacity="0.06"/>
  <circle cx="1000" cy="350" r="250" fill="#a855f7" opacity="0.06"/>
  <!-- Accent line -->
  <rect x="100" y="200" width="120" height="4" rx="2" fill="url(#accent)"/>
  <!-- Text -->
  <text x="100" y="270" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff">AI Automation</text>
  <text x="100" y="345" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="url(#accent)">Specialist</text>
  <text x="100" y="410" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#94a3b8">Custom chatbots · Workflow automation · AI solutions</text>
  <!-- Bottom accent line -->
  <rect x="100" y="460" width="80" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Brand -->
  <text x="100" y="550" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="url(#accent)">Crivellaro</text>
  <text x="1100" y="550" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#64748b">yourdomain.com</text>
</svg>
